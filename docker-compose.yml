services:
    e-commerce:
        container_name: e-commerce
        # docker-compose is able to build an image from a Dockerfile
        build:
            # specifies the build-directory, where the Dockerfile is looked-up
            context: .
            dockerfile: Dockerfile
        image: e-commerce:latest
        # The special DNS name host.docker.internal resolves to the host 
        # machine's internal IP address. This allows the container to communicate 
        # with the Alloy instance running on the host machine.
        extra_hosts:
          - "host.docker.internal:host-gateway"
        environment:
          - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317 # localhost
          - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
          - OTEL_SERVICE_NAME=e-commerce-service
          - JAVA_TOOL_OPTIONS=-javaagent:/grafana-opentelemetry-java.jar
        ports:
            - 9090:9090
        networks:
            - e-commerce-network
networks:
    e-commerce-network:
        driver: bridge